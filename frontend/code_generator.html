<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bajaj Health — OPD Quote Code Generator</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap');
:root{
  --navy:#003087;--blue:#0057b8;--blue-mid:#1565c0;--light-blue:#e8f0fb;
  --accent:#c8001e;--dark:#1a1a2e;--mid:#4a5568;--muted:#718096;
  --light:#f4f7fc;--white:#fff;--border:#d1dce8;--border-light:#e8edf5;
  --success:#047857;--error:#dc2626;--row-even:#f8fafd;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--light);color:var(--dark);min-height:100vh;font-size:14px}

/* HEADER */
.phdr{background:linear-gradient(135deg,var(--navy),var(--blue-mid));padding:0 36px;display:flex;align-items:center;justify-content:space-between;height:66px;box-shadow:0 2px 20px rgba(0,48,135,.35);position:sticky;top:0;z-index:200}
.phdr-l{display:flex;align-items:center;gap:14px}
.logo-pill{background:#fff;border-radius:7px;padding:5px 10px;display:flex;align-items:center}
.logo-pill img{height:34px}
.phdr-ttl{color:#fff;font-size:1rem;font-weight:700;font-family:'EB Garamond',serif;border-left:1px solid rgba(255,255,255,.28);padding-left:14px;line-height:1.35}
.phdr-ttl small{display:block;font-size:.68rem;font-family:'DM Sans',sans-serif;font-weight:400;opacity:.7}
.hbadge{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);color:rgba(255,255,255,.9);padding:4px 12px;border-radius:20px;font-size:.67rem;letter-spacing:.08em;text-transform:uppercase}

/* LAYOUT */
.wrap{max-width:1060px;margin:0 auto;padding:24px 18px 60px}
.card{background:#fff;border-radius:14px;box-shadow:0 2px 24px rgba(0,48,135,.07);overflow:hidden;margin-bottom:16px}
.chead{background:linear-gradient(90deg,var(--navy),var(--blue-mid));padding:13px 24px;display:flex;align-items:center;gap:9px}
.chead-ico{width:28px;height:28px;background:rgba(255,255,255,.15);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
.chead h2{color:#fff;font-family:'EB Garamond',serif;font-size:1.05rem;font-weight:600}
.chead p{color:rgba(255,255,255,.65);font-size:.7rem;margin-top:1px}
.cbody{padding:22px 24px}

/* STEPPER */
.stepper{display:flex;align-items:center;background:#fff;border-radius:12px;box-shadow:0 2px 16px rgba(0,48,135,.06);padding:14px 24px;margin-bottom:20px;overflow-x:auto;gap:0}
.st{display:flex;align-items:center;gap:6px;flex-shrink:0}
.st-num{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:var(--muted);transition:.2s;flex-shrink:0}
.st-lbl{font-size:.72rem;font-weight:600;color:var(--muted);white-space:nowrap}
.st.done .st-num{background:var(--success);border-color:var(--success);color:#fff}
.st.active .st-num{background:var(--navy);border-color:var(--navy);color:#fff}
.st.active .st-lbl{color:var(--navy);font-weight:700}
.st-conn{flex:1;min-width:20px;height:2px;background:var(--border);margin:0 6px}
.st-conn.done{background:var(--success)}

/* FORMS */
.fg{display:flex;flex-direction:column;gap:4px}
.fgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.sp2{grid-column:span 2}.sp3{grid-column:span 3}
label.lbl{font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.055em;color:var(--mid)}
label.lbl .req{color:var(--accent)}
.finput{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.85rem;color:var(--dark);background:#fff;transition:.16s;outline:none;-webkit-appearance:none;appearance:none}
.finput:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,87,184,.1)}
.finput.err{border-color:var(--error)!important}
select.finput{cursor:pointer}
.sw-wrap{position:relative}.sw-wrap::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--mid);pointer-events:none;font-size:.78rem}
.fhint{font-size:.65rem;color:#94a3b8;margin-top:2px}
.divider{border:none;border-top:1px solid var(--border-light);margin:18px 0}

/* CHIPS */
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px}
.chip{padding:5px 14px;border-radius:20px;font-size:.73rem;font-weight:600;border:1.5px solid var(--border);background:#fff;color:var(--mid);cursor:pointer;transition:.14s;user-select:none}
.chip:hover{background:var(--light-blue);color:var(--blue);border-color:var(--blue)}
.chip.sel{background:var(--navy);color:#fff;border-color:var(--navy)}

/* BUTTONS */
.btn-prim{background:linear-gradient(135deg,var(--navy),var(--blue-mid));color:#fff;border:none;padding:11px 32px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;letter-spacing:.02em;box-shadow:0 3px 12px rgba(0,87,184,.27);transition:.16s;display:inline-flex;align-items:center;gap:7px}
.btn-prim:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(0,87,184,.35)}
.btn-sec{background:#fff;color:var(--blue);border:1.5px solid var(--blue);padding:11px 22px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:.16s;display:inline-flex;align-items:center;gap:6px}
.btn-sec:hover{background:var(--light-blue)}
.btn-ghost{background:#fff;color:var(--mid);border:1.5px solid var(--border);padding:11px 22px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:.16s}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue)}
.btn-sm{padding:5px 12px;font-size:.72rem;border-radius:6px}
.btn-danger{background:#fff;color:var(--error);border:1.5px solid #fecaca;padding:4px 10px;border-radius:5px;font-size:.7rem;font-family:'DM Sans',sans-serif;cursor:pointer;transition:.13s}
.btn-danger:hover{background:#fef2f2}
.form-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

/* INPUT MODE TABS */
.imode-tabs{display:flex;background:var(--light);border:1.5px solid var(--border);border-radius:9px;overflow:hidden;max-width:400px;margin-bottom:16px}
.imode-tab{flex:1;padding:9px 14px;text-align:center;cursor:pointer;font-size:.78rem;font-weight:500;color:var(--mid);background:transparent;border:none;font-family:'DM Sans',sans-serif;transition:.15s;line-height:1.3}
.imode-tab:hover{background:var(--light-blue);color:var(--blue)}
.imode-tab.itsel{background:var(--navy);color:#fff;font-weight:700}

/* PASTE AREA */
.paste-area{width:100%;min-height:120px;padding:12px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Mono',monospace;font-size:.78rem;color:var(--dark);resize:vertical;outline:none;transition:.16s}
.paste-area:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,87,184,.1)}
.paste-hint{font-size:.7rem;color:var(--muted);background:var(--light-blue);border:1px solid #bfdbfe;padding:8px 12px;border-radius:6px;margin-bottom:10px;display:flex;align-items:flex-start;gap:6px}

/* COLUMN MAPPER */
.mapper-preview{overflow-x:auto;border:1.5px solid var(--border);border-radius:9px;margin:12px 0}
.mapper-tbl{width:100%;border-collapse:collapse;font-size:.76rem;min-width:400px}
.mapper-tbl .map-hdr{background:var(--light-blue);padding:4px 8px;border-bottom:1px solid var(--border)}
.mapper-tbl .map-hdr select{width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:5px;font-size:.7rem;font-family:'DM Sans',sans-serif;background:#fff;outline:none}
.mapper-tbl td{padding:5px 8px;border-bottom:1px solid var(--border-light);vertical-align:middle;white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis}
.mapper-tbl tr:nth-child(even) td{background:var(--row-even)}
.mapper-tbl .rn{color:var(--muted);font-size:.65rem;width:24px;text-align:center}
.map-col-name{background:#eff6ff;font-weight:700;color:var(--blue)}

/* BENEFIT TABLE */
.ben-tbl-wrap{overflow-x:auto;border:1.5px solid var(--border);border-radius:9px}
.ben-tbl{width:100%;border-collapse:collapse;font-size:.78rem}
.ben-tbl thead th{background:var(--navy);color:#fff;padding:7px 10px;font-size:.64rem;text-transform:uppercase;letter-spacing:.04em;font-weight:600;text-align:left;white-space:nowrap;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.ben-tbl td{padding:5px 7px;border-bottom:1px solid var(--border-light);vertical-align:middle}
.ben-tbl tr:hover td{background:#f8fafd}
.ben-tbl input,.ben-tbl select{border:1px solid var(--border);border-radius:5px;padding:5px 8px;font-size:.76rem;font-family:'DM Sans',sans-serif;width:100%;outline:none;transition:.12s}
.ben-tbl input:focus,.ben-tbl select:focus{border-color:var(--blue)}
.mode-pill-wrap{display:flex;gap:3px;flex-wrap:wrap}
.mpill{padding:2px 8px;border-radius:4px;font-size:.61rem;font-weight:700;cursor:pointer;border:1.5px solid transparent;transition:.1s;font-family:'DM Sans',sans-serif;white-space:nowrap}
.mpill.CL{background:#d1fae5;color:#065f46;border-color:#a7f3d0}
.mpill.RI{background:#fef3c7;color:#92400e;border-color:#fcd34d}
.mpill.VO{background:#fce7f3;color:#9d174d;border-color:#f9a8d4}
.mpill.CLRI{background:#e0e7ff;color:#3730a3;border-color:#c7d2fe}
.mpill.sel{transform:scale(1.08);box-shadow:0 1px 4px rgba(0,0,0,.12)}

/* RATE GRID */
.rate-grid-wrap{border:1.5px solid var(--border);border-radius:9px;overflow:hidden}
.rate-grid{width:100%;border-collapse:collapse;font-size:.8rem}
.rate-grid thead th{background:var(--navy);color:#fff;padding:8px 14px;font-size:.65rem;text-transform:uppercase;letter-spacing:.04em}
.rate-grid thead th:not(:first-child){text-align:right}
.rate-grid tbody td{padding:7px 12px;border-bottom:1px solid var(--border-light)}
.rate-grid tbody tr:last-child td{border-bottom:none}
.rate-grid .fam-name{font-weight:600;color:var(--dark)}
.rate-grid .fam-sub{font-size:.65rem;color:var(--muted)}
.rate-input{border:1.5px solid var(--border);border-radius:6px;padding:7px 10px;font-family:'DM Mono',monospace;font-size:.82rem;width:120px;text-align:right;outline:none;transition:.13s;float:right}
.rate-input:focus{border-color:var(--blue)}

/* PHC TOGGLE */
.toggle-wrap{display:flex;background:var(--light);border:1.5px solid var(--border);border-radius:8px;overflow:hidden;max-width:240px}
.toggle-opt{flex:1;padding:9px 14px;text-align:center;cursor:pointer;font-size:.78rem;font-weight:500;color:var(--mid);background:transparent;border:none;font-family:'DM Sans',sans-serif;transition:.15s}
.toggle-opt:hover{background:var(--light-blue);color:var(--blue)}
.toggle-opt.tsel{background:var(--navy);color:#fff;font-weight:700}
.toggle-section{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border-light)}
.toggle-section.show{display:block}

/* OUTPUT ACTION BAR */
.out-bar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.btn-pdf{background:var(--accent);color:#fff;border:none;padding:10px 24px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.84rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.16s}
.btn-pdf:hover{background:#a60017;transform:translateY(-1px)}
.btn-word{background:#fff;color:#1565c0;border:1.5px solid #1565c0;padding:10px 20px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.84rem;font-weight:600;cursor:pointer;transition:.16s;display:flex;align-items:center;gap:6px}
.btn-word:hover{background:#e8f0fb}
.btn-edit-q{background:#fff;color:var(--mid);border:1.5px solid var(--border);padding:10px 20px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.84rem;font-weight:600;cursor:pointer;transition:.16s}
.btn-edit-q:hover{border-color:var(--blue);color:var(--blue)}

/* ══════════════════════════════════════════
   QUOTE DOCUMENT — WCP IDENTICAL STYLES
   ══════════════════════════════════════════ */
#quote-doc{background:#fff;border-radius:12px;box-shadow:0 2px 24px rgba(0,48,135,.08);overflow:hidden;font-size:12.5px}
.qdh{background:var(--navy);padding:18px 30px;display:flex;align-items:center;justify-content:space-between;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.qdh-logo{background:#fff;border-radius:6px;padding:5px 9px;display:inline-flex;align-items:center}
.qdh-logo img{height:30px}
.qdh-right{text-align:right}
.qdh-title{color:#fff;font-size:1.1rem;font-weight:700;font-family:'EB Garamond',serif;letter-spacing:.02em}
.qdh-sub{color:rgba(255,255,255,.6);font-size:.7rem;margin-top:2px}
.qstrip{background:var(--light-blue);border-bottom:1px solid var(--border);padding:7px 30px;display:flex;justify-content:space-between;align-items:center;font-size:.72rem;color:var(--mid);flex-wrap:wrap;gap:6px}
.qstrip strong{color:var(--blue);font-weight:700}
.qdet{display:grid;grid-template-columns:1fr 1fr;border-bottom:2px solid var(--navy)}
.qdet-col{padding:12px 28px}
.qdet-col:first-child{border-right:1px solid var(--border-light)}
.drow{display:flex;align-items:baseline;padding:3.5px 0;border-bottom:1px dotted var(--border-light);font-size:.78rem}
.drow:last-child{border-bottom:none}
.dlbl{color:var(--muted);min-width:175px;font-size:.72rem;flex-shrink:0}
.dval{color:var(--dark);font-weight:600}
.qsec{background:var(--navy);color:#fff;font-size:.69rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:6px 30px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.qtable{width:100%;border-collapse:collapse;font-size:.77rem}
.qtable thead tr th{background:#1a3a6b;color:#fff;padding:7px 13px;text-align:left;font-weight:600;font-size:.68rem;text-transform:uppercase;letter-spacing:.04em;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.qtable tbody tr td{padding:6px 13px;border-bottom:1px solid var(--border-light);vertical-align:middle}
.qtable tbody tr:nth-child(even) td{background:var(--row-even)}
.qtable .tsec td{background:#eef3fb!important;color:var(--blue);font-weight:700;font-size:.7rem;text-transform:uppercase;letter-spacing:.04em;padding:5px 13px}
.mb{display:inline-block;padding:1px 7px;border-radius:4px;font-size:.63rem;font-weight:700}
.mb-cl{background:#d1fae5;color:#065f46}
.mb-ri{background:#fef3c7;color:#92400e}
.mb-bt{background:#e0e7ff;color:#3730a3}
.mb-vo{background:#fce7f3;color:#9d174d}
.qprem{padding:14px 28px 18px}
.pbox{border:2px solid var(--navy);border-radius:10px;overflow:hidden}
.pbox-head{background:var(--navy);color:#fff;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:6px 18px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.pbox .qtable thead tr th{background:#1a3a6b}
.pbox .qtable tbody .total-row td{background:var(--navy)!important;color:#fff;font-weight:700;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.pbox .qtable tbody .total-row td:not(:first-child){color:#fcd34d;font-family:'EB Garamond',serif;font-size:.9rem}
.pbox-note{font-size:.64rem;color:var(--muted);padding:5px 14px 8px;text-align:right}
.qtnc{padding:0 30px 0}
.tnc-full{padding:0 0 16px}
.tnc2-section{margin-bottom:14px}
.tnc2-head{background:#1a3a6b;color:white;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:5px 10px;border-radius:4px;margin-bottom:8px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.tnc2-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 18px}
.tnc2-blk{font-size:.68rem;color:var(--dark)}
.tnc2-blk h4{font-size:.7rem;font-weight:700;color:var(--navy);margin-bottom:3px}
.tnc2-blk p{line-height:1.5;color:var(--mid);margin-bottom:3px}
.tnc2-blk strong{color:var(--dark)}
.tnc2-excl{font-size:.67rem;color:var(--mid);line-height:1.65;padding:6px 8px;background:#f8fafd;border-radius:5px;border-left:3px solid var(--navy)}
.tnc2-list{padding-left:14px}
.tnc2-list li{font-size:.68rem;color:var(--mid);line-height:1.55;margin-bottom:2px}
.phc-section{border-top:2px solid var(--navy)}
.phc-head{background:var(--navy);color:white;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:6px 13px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.phc-table{width:100%;border-collapse:collapse;font-size:.71rem}
.phc-table th{background:#1a3a6b;color:white;padding:6px 10px;text-align:left;font-weight:600;font-size:.67rem;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.phc-table td{padding:5px 10px;border-bottom:1px solid var(--border-light);vertical-align:top}
.phc-table tr:nth-child(even) td{background:#f8fafd}
.phc-cat{font-weight:700;color:var(--navy);font-size:.69rem}
.qfoot{background:var(--navy);color:rgba(255,255,255,.6);font-size:.63rem;text-align:center;padding:8px 18px;-webkit-print-color-adjust:exact;print-color-adjust:exact}

/* PRINT */
@media print{
  body{background:#fff}
  .phdr,.wrap>*:not(#output-section){display:none!important}
  #output-section,#quote-doc{display:block!important}
  .out-bar{display:none!important}
  #quote-doc{box-shadow:none;border-radius:0}
  .qdh,.qsec,.qtable thead tr th,.pbox-head,.phc-head,.total-row,.qfoot{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  @page{margin:8mm;size:A4}
}
@media(max-width:700px){
  .fgrid{grid-template-columns:1fr 1fr}
  .qdet{grid-template-columns:1fr}
  .tnc2-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useCallback, useEffect } = React;

// ═══════════════════════════════════════════════════════

// ─── Utilities ───────────────────────────────────────────
let _uid = 1;
const uid = () => _uid++;
const fmt = v => v ? '₹' + Number(v).toLocaleString('en-IN') : '—';
const fmtGST = v => v ? '₹' + Math.round(Number(v) * 0.18).toLocaleString('en-IN') : '—';
const fmtGross = v => v ? '₹' + Math.round(Number(v) * 1.18).toLocaleString('en-IN') : '—';
const esc = s => (s||'').replace(/&(?!amp;|lt;|gt;)/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function normalizeMode(raw) {
  if (!raw) return 'CL';
  const s = raw.toString().trim().toLowerCase().replace(/\s+/g,'');
  if ((s.includes('cash') && s.includes('reim')) || s==='cl+ri' || s==='clri' || s==='both') return 'CLRI';
  if (s.includes('reim') || s==='ri') return 'RI';
  if (s.includes('vouch') || s==='vo' || s==='voucher') return 'VO';
  if (s.includes('cash') || s==='cl' || s==='cashless') return 'CL';
  return 'CL';
}

function parsePasteData(text) {
  if (!text.trim()) return [];
  return text.trim().split('\n').map(r => r.split('\t').map(c => c.trim())).filter(r => r.some(c => c));
}

// ─── STEP 3: Benefits — Column Mapper ─────────────────────
function StepBenefits({ S, upd }) {
  const [mode, setMode] = useState(S.inputMode || 'paste');
  const [pasteText, setPasteText] = useState('');
  const [rows, setRows] = useState([]); // 2D array after parse
  const [colMap, setColMap] = useState({ name:-1, mode:-1, sublimit:-1, remarks:-1 });
  const [mapDone, setMapDone] = useState(false);
  const fileRef = useRef();

  // Sync back to parent
  const updBens = bens => upd({ benefits: bens });

  // ─ Parse paste
  function handleParse() {
    const parsed = parsePasteData(pasteText);
    if (!parsed.length) return;
    // Auto-detect header row (if first row has no numbers)
    const firstRowLooksLikeHeader = parsed[0].every(c => isNaN(parseFloat(c)));
    setRows(parsed);
    // Try auto-map based on header text
    if (firstRowLooksLikeHeader) {
      const hdr = parsed[0].map(h => h.toLowerCase());
      const autoMap = { name:-1, mode:-1, sublimit:-1, remarks:-1 };
      hdr.forEach((h,i) => {
        if (/benefit|name|cover|description/i.test(h)) autoMap.name = i;
        else if (/mode|utilis|channel/i.test(h)) autoMap.mode = i;
        else if (/sub.?limit|amount|value|coverage|limit|si\b/i.test(h)) autoMap.sublimit = i;
        else if (/remark|note|comment|desc/i.test(h)) autoMap.remarks = i;
      });
      setColMap(autoMap);
    }
    setMapDone(false);
  }

  // ─ File upload via SheetJS
  function handleFile(e) {
    const f = e.target.files[0]; if (!f) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const wb = XLSX.read(ev.target.result, { type:'binary' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const data = XLSX.utils.sheet_to_json(ws, { header:1 });
        setRows(data.filter(r => r.some(c => c !== undefined && c !== '')).map(r => r.map(c => c===undefined?'':String(c).trim())));
        setMapDone(false);
        setColMap({ name:-1, mode:-1, sublimit:-1, remarks:-1 });
      } catch(err) { alert('Could not read file. Please try Excel paste instead.'); }
    };
    reader.readAsBinaryString(f);
  }

  // ─ Apply mapping → create benefit rows
  function applyMapping() {
    const dataRows = rows.filter((r,i) => {
      if (i === 0 && r.every(c => isNaN(parseFloat(c)))) return false; // skip header
      return r.some(c => c);
    });
    const newBens = dataRows.map(r => ({
      id: uid(),
      name: colMap.name >= 0 ? (r[colMap.name] || '') : '',
      mode: colMap.mode >= 0 ? normalizeMode(r[colMap.mode]) : 'CL',
      sublimit: colMap.sublimit >= 0 ? (r[colMap.sublimit] || '') : '',
      remarks: colMap.remarks >= 0 ? (r[colMap.remarks] || '') : '',
    })).filter(b => b.name);
    updBens(newBens);
    setMapDone(true);
  }

  // ─ Manual add row
  function addRow() {
    updBens([...(S.benefits||[]), { id:uid(), name:'', mode:'CL', sublimit:'', remarks:'' }]);
  }

  function delRow(id) { updBens(S.benefits.filter(b=>b.id!==id)); }
  function updRow(id, patch) { updBens(S.benefits.map(b=>b.id===id?{...b,...patch}:b)); }

  const previewRows = rows.slice(0, 6);
  const colCount = rows[0] ? rows[0].length : 0;
  const FIELD_OPTS = ['skip','Benefit Name','Mode','Sublimit / Coverage','Remarks'];
  const fieldToKey = { 'Benefit Name':'name', 'Mode':'mode', 'Sublimit / Coverage':'sublimit', 'Remarks':'remarks' };

  return (
    <div className="card">
      <div className="chead"><div className="chead-ico">📊</div>
        <div><h2>Benefits Configuration</h2><p>Add benefit rows via paste from Excel, file upload, or manual entry</p></div>
      </div>
      <div className="cbody">
        {/* Mode selector */}
        <div className="imode-tabs">
          {['paste','upload','manual'].map(m=>(
            <button key={m} className={'imode-tab '+(mode===m?'itsel':'')} onClick={()=>{setMode(m);upd({inputMode:m});}}>
              {m==='paste'?'📋 Paste from Excel':m==='upload'?'📁 Upload File':'✏️ Manual Entry'}
            </button>
          ))}
        </div>

        {/* PASTE MODE */}
        {mode === 'paste' && (
          <div>
            <div className="paste-hint">
              💡 Copy your benefit table directly from Excel (Ctrl+C on selected cells) and paste below. The tool will detect columns — you then confirm which column is which.
            </div>
            <div className="fg" style={{marginBottom:10}}>
              <label className="lbl">Paste Excel Data Here</label>
              <textarea className="paste-area" value={pasteText}
                onChange={e=>{setPasteText(e.target.value);setRows([]);setMapDone(false);}}
                placeholder={"Benefit Name\tMode\tSublimit\nDoctor Consultation\tCashless\tFull Wallet\nPrescribed Pharmacy\tCashless\tFull Wallet\nDental\tReimbursement\t₹5,000..."}
              />
              <span className="fhint">{pasteText ? `${parsePasteData(pasteText).length} rows detected` : 'Supports tab-separated data from Excel'}</span>
            </div>
            <button className="btn-sec btn-sm" onClick={handleParse} disabled={!pasteText.trim()}>
              🔍 Parse &amp; Map Columns
            </button>
          </div>
        )}

        {/* UPLOAD MODE */}
        {mode === 'upload' && (
          <div>
            <div className="paste-hint">
              📁 Upload an Excel file (.xlsx, .xls, .csv). First sheet will be used. Columns will be mapped in the next step.
            </div>
            <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{display:'none'}} onChange={handleFile}/>
            <button className="btn-sec" onClick={()=>fileRef.current.click()}>📂 Choose File</button>
            {rows.length > 0 && <span style={{marginLeft:10,fontSize:'.75rem',color:'var(--success)'}}>✓ {rows.length} rows loaded</span>}
          </div>
        )}

        {/* COLUMN MAPPER — shown after paste or upload */}
        {(mode === 'paste' || mode === 'upload') && rows.length > 0 && !mapDone && (
          <div style={{marginTop:16}}>
            <div style={{fontSize:'.78rem',fontWeight:700,color:'var(--navy)',marginBottom:8}}>
              Step 2 — Assign Columns &nbsp;<span style={{fontWeight:400,color:'var(--muted)'}}>Tell the tool what each column contains</span>
            </div>
            <div className="mapper-preview">
              <table className="mapper-tbl">
                <thead>
                  <tr>
                    <th className="map-hdr rn">#</th>
                    {Array.from({length:colCount},(_,i)=>(
                      <th key={i} className="map-hdr">
                        <select value={
                          Object.entries(colMap).find(([k,v])=>v===i)?.[0]
                            ? FIELD_OPTS.find(f=>fieldToKey[f]===Object.entries(colMap).find(([k,v])=>v===i)?.[0]) || 'skip'
                            : 'skip'
                        } onChange={e=>{
                          const chosen = e.target.value;
                          const key = fieldToKey[chosen];
                          // clear old assignment for this column
                          const fresh = { ...colMap };
                          Object.keys(fresh).forEach(k=>{ if(fresh[k]===i) fresh[k]=-1; });
                          if (key) fresh[key] = i;
                          setColMap(fresh);
                        }}>
                          {FIELD_OPTS.map(f=><option key={f} value={f}>{f==='skip'?'— Skip —':f}</option>)}
                        </select>
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {previewRows.map((r,ri)=>(
                    <tr key={ri}>
                      <td className="rn" style={{color:'var(--muted)'}}>{ri+1}</td>
                      {Array.from({length:colCount},(_,ci)=>(
                        <td key={ci} className={
                          Object.values(colMap).includes(ci) ? 'map-col-name' : ''
                        }>{r[ci]||''}</td>
                      ))}
                    </tr>
                  ))}
                  {rows.length > 6 && <tr><td colSpan={colCount+1} style={{textAlign:'center',color:'var(--muted)',fontSize:'.68rem',padding:'4px 8px'}}>…{rows.length-6} more rows</td></tr>}
                </tbody>
              </table>
            </div>
            <div style={{display:'flex',gap:10,alignItems:'center',marginTop:10}}>
              <button className="btn-prim btn-sm" onClick={applyMapping} disabled={colMap.name<0}>
                ✓ Apply Mapping &amp; Import {rows.length} Rows
              </button>
              {colMap.name<0 && <span style={{fontSize:'.7rem',color:'var(--error)'}}>Please assign at least the "Benefit Name" column</span>}
            </div>
          </div>
        )}

        {mapDone && (
          <div style={{background:'#d1fae5',border:'1px solid #6ee7b7',padding:'7px 12px',borderRadius:7,fontSize:'.76rem',color:'var(--success)',margin:'10px 0',display:'flex',alignItems:'center',gap:7}}>
            ✓ {S.benefits.length} benefit rows imported. You can edit them below or add more manually.
            <button className="btn-ghost btn-sm" style={{marginLeft:'auto'}} onClick={()=>{setMapDone(false);setRows([]);}}>Re-import</button>
          </div>
        )}

        {/* BENEFIT TABLE — always shown */}
        <div style={{marginTop:16}}>
          {S.benefits.length > 0 && (
            <div className="ben-tbl-wrap" style={{marginBottom:10}}>
              <table className="ben-tbl">
                <thead>
                  <tr>
                    <th style={{width:32}}>#</th>
                    <th style={{minWidth:200}}>Benefit Name</th>
                    <th style={{width:180}}>Utilisation Mode</th>
                    <th style={{minWidth:140}}>Coverage / Sublimit</th>
                    <th style={{minWidth:120}}>Remarks</th>
                    <th style={{width:32}}></th>
                  </tr>
                </thead>
                <tbody>
                  {S.benefits.map((b,i)=>(
                    <tr key={b.id}>
                      <td style={{textAlign:'center',color:'var(--muted)',fontSize:'.65rem'}}>{i+1}</td>
                      <td><input value={b.name} onChange={e=>updRow(b.id,{name:e.target.value})} placeholder="Benefit name"/></td>

                        <div className="mode-pill-wrap">

// ─── WORD EXPORT ──────────────────────────────────────────
function exportWord(S) {
  const html = buildQuoteHTML(S);
  const doc = `<!DOCTYPE html><html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word"><head><meta charset="utf-8"><title>OPD Quote</title><style>
    @page{margin:2cm}body{font-family:Calibri,sans-serif;font-size:10pt}
    table{border-collapse:collapse;width:100%;margin:6pt 0}
    td,th{border:1pt solid #d1dce8;padding:4pt 7pt;font-size:9pt}
    th{background:#003087;color:white}
    h2{color:#003087;font-size:11pt}
  </style></head><body>${html}</body></html>`;
  const blob = new Blob(['\ufeff', doc], { type: 'application/msword' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const co = (S.client?.co || 'Quote').replace(/\s+/g,'_').slice(0,20);
  a.download = `${co}_OPD_Quote.doc`;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ─── APP ──────────────────────────────────────────────────
const STEPS = [
  { label: 'Client Info', icon: '👤' },
  { label: 'Product', icon: '⚙️' },
  { label: 'Benefits', icon: '📊' },
  { label: 'Rates', icon: '💰' },
  { label: 'Options', icon: '🔧' },
];

function App() {
  const [S, setS] = useState({
    step: 0,
    generated: false,
    client: { co:'', cid:'', emp:'', families:['E','ESC','ESCP'], partType:'Compulsory', date:'', expiry:'', quoteType:'Fresh' },
    product: { type:'Fungible Wallet', walletSI:'', hasWellness:false, wellnessSI:'', plan:'Silver' },
    inputMode: 'paste',
    benefits: [],
    rates: {},
    phc: { enabled:false, pkg:'classic', mode:'CL', walletDed:'yes', customTests:'' },
    endorsement: 'full',
  });
  const quoteRef = useRef();
  const [pdfLoading, setPdfLoading] = useState(false);

  const upd = patch => setS(prev => ({ ...prev, ...patch }));

  function validate() {
    if (!S.client.co.trim()) { alert('Please enter Company / Insured Name in Step 1.'); return false; }
    if (!S.client.families.length) { alert('Please select at least one family construct in Step 1.'); return false; }
    return true;
  }

  function generate() {
    if (!validate()) return;
    upd({ generated: true });
    setTimeout(() => {
      quoteRef.current?.scrollIntoView({ behavior:'smooth' });
    }, 100);
    // ── Save quote to backend ──
    const quoteRefId = S.client.cid
      ? 'QCG-' + S.client.cid.replace(/[^A-Z0-9]/gi,'').toUpperCase().slice(0,8) + '-' + new Date().getFullYear()
      : 'QCG-' + Date.now().toString(36).toUpperCase().slice(-6);
    fetch('/api/saveQuote', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('bfhl_token') },
      body: JSON.stringify({
        quote_ref: quoteRefId,
        tool_source: 'CODE_GENERATOR',
        client_name: S.client.co,
        client_id: S.client.cid,
        employee_count: parseInt(S.client.emp) || null,
        family_construct: S.client.families.join(','),
        coverage_type: S.client.partType === 'Compulsory' ? 'COMPULSORY' : 'VOLUNTARY',
        product_type: S.product.type,
        wallet_si: parseInt(S.product.walletSI) || null,
        plan_tier: S.product.plan,
        wellness_mode: S.product.hasWellness ? 'with' : 'without',
        benefit_count: S.benefits.length,
        rates_json: S.rates,
        quote_date: S.client.date,
        status: 'DRAFT'
      })
    }).catch(e => console.warn('Quote save failed:', e));
  }

  function dlPDF() {
    if (!quoteRef.current) return;
    const btn = document.getElementById('btn-pdf');
    if (btn) { btn.disabled = true; btn.textContent = '⟳ Generating…'; }
    setPdfLoading(true);
    const co = (S.client?.co || 'Quote').replace(/\s+/g,'_').slice(0,20);
    html2pdf().set({
      margin: [8,8,8,8],
      filename: `${co}_OPD_Quote.pdf`,
      image: { type:'jpeg', quality:.97 },
      html2canvas: { scale:2, useCORS:true, logging:false },
      jsPDF: { unit:'mm', format:'a4', orientation:'portrait' }
    }).from(quoteRef.current).save().finally(() => {
      setPdfLoading(false);
      if (btn) { btn.disabled = false; btn.innerHTML = '⬇ Download PDF'; }
    });
  }

  const stepDone = i => i < S.step;
  const canNext = S.step < 4;
  const canBack = S.step > 0;

  if (S.generated) {
    return (
      <>
        <div className="phdr">
          <div className="phdr-l">
            <div className="logo-pill"><img src={LOGO} alt="Bajaj Health" style={{height:34}} onError={e=>e.target.parentNode.innerHTML='<b style="color:#003087">BAJAJ HEALTH</b>'}/></div>
            <div className="phdr-ttl">OPD Quote Code Generator<small>Bajaj Finserv Health — Quote Output</small></div>
          </div>
        </div>
        <div className="wrap" id="output-section">
          <div className="out-bar">
            <button id="btn-pdf" className="btn-pdf" onClick={dlPDF}>⬇ Download PDF</button>
            <button className="btn-word" onClick={()=>exportWord(S)}>📄 Export to Word</button>
            <button className="btn-edit-q" onClick={()=>upd({generated:false})}>✏ Edit Inputs</button>
            <span style={{marginLeft:'auto',fontSize:'.68rem',color:'#94a3b8'}}>WCP Format v2.0</span>
          </div>
          <div id="quote-doc" ref={quoteRef} dangerouslySetInnerHTML={{__html: buildQuoteHTML(S)}}/>
        </div>
      </>
    );
  }

  return (
    <>
      {/* HEADER */}
      <div className="phdr">
        <div className="phdr-l">
          <div className="logo-pill"><img src={LOGO} alt="Bajaj Health" style={{height:34}} onError={e=>e.target.parentNode.innerHTML='<b style="color:#003087">BAJAJ HEALTH</b>'}/></div>
          <div className="phdr-ttl">OPD Quote Code Generator<small>Bajaj Finserv Health — Structured Quotation Builder</small></div>
        </div>
        <span className="hbadge">WCP Format · Works Offline</span>
        <a href="/dashboard.html" style={{color:'rgba(255,255,255,.85)',fontSize:'.78rem',fontFamily:"'DM Sans',sans-serif",textDecoration:'none',background:'rgba(255,255,255,.12)',padding:'6px 14px',borderRadius:'7px',border:'1px solid rgba(255,255,255,.2)'}}>← Dashboard</a>
      </div>

      <div className="wrap">
        {/* STEPPER */}
        <div className="stepper">
          {STEPS.map((st,i) => (
            <React.Fragment key={i}>
              {i > 0 && <div className={'st-conn '+(stepDone(i)?'done':'')}/>}
              <div className={'st '+(stepDone(i)?'done':i===S.step?'active':'')}
                style={{cursor:i<=S.step?'pointer':'default'}}
                onClick={()=>{ if(i<=S.step) upd({step:i}); }}>
                <div className="st-num">{stepDone(i)?'✓':i+1}</div>
                <div className="st-lbl">{st.icon} {st.label}</div>
              </div>
            </React.Fragment>
          ))}
        </div>

        {/* STEP CONTENT */}
        {S.step === 0 && <StepClient S={S} upd={upd}/>}
        {S.step === 1 && <StepProduct S={S} upd={upd}/>}
        {S.step === 2 && <StepBenefits S={S} upd={upd}/>}
        {S.step === 3 && <StepRates S={S} upd={upd}/>}
        {S.step === 4 && <StepOptions S={S} upd={upd}/>}

        {/* NAVIGATION */}
        <div className="card" style={{background:'linear-gradient(135deg,#f8fafd,#eef3fb)'}}>
          <div className="cbody" style={{padding:'16px 24px'}}>
            <div className="form-actions">
              {canBack && (
                <button className="btn-ghost" onClick={()=>upd({step:S.step-1})}>← Back</button>
              )}
              {canNext && (
                <button className="btn-prim" onClick={()=>{
                  if (S.step===0 && !S.client.co.trim()) { alert('Please enter Company Name before continuing.'); return; }
                  upd({step:S.step+1});
                }}>
                  Next: {STEPS[S.step+1].label} →
                </button>
              )}
              {S.step === 4 && (
                <button className="btn-prim" style={{background:'linear-gradient(135deg,#047857,#065f46)',boxShadow:'0 3px 12px rgba(4,120,87,.3)'}} onClick={generate}>
                  ▶ Generate Quote
                </button>
              )}
              <button className="btn-ghost" style={{marginLeft:'auto'}} onClick={()=>{
                if(confirm('Reset all fields and start over?')) setS({
                  step:0, generated:false,
                  client:{co:'',cid:'',emp:'',families:['E','ESC','ESCP'],partType:'Compulsory',date:'',expiry:'',quoteType:'Fresh'},
                  product:{type:'Fungible Wallet',walletSI:'',hasWellness:false,wellnessSI:'',plan:'Silver'},
                  inputMode:'paste', benefits:[], rates:{},
                  phc:{enabled:false,pkg:'classic',mode:'CL',walletDed:'yes',customTests:''},
                  endorsement:'full',
                });
              }}>↺ Reset All</button>
            </div>
            <div style={{marginTop:8,fontSize:'.68rem',color:'#94a3b8'}}>
              Step {S.step+1} of {STEPS.length} — {STEPS[S.step].label}
              {S.benefits.length > 0 && ` · ${S.benefits.length} benefits`}
              {Object.values(S.rates).some(v=>v) && ` · Rates entered`}
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
